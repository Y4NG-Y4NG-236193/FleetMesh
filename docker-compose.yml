services:

  frontend:
    build:
      context: ./frontend

    ports:
      - "3001:3000"

    depends_on:
      - backend

  backend:
    build:
      context: ./backend

    ports:
      - "5001:5000"

    environment:
      DATABASE_URL: postgresql://fleetmesh:password@postgres:5432/fleetmesh
      REDIS_HOST: redis

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17

    environment:
      POSTGRES_DB: fleetmesh
      POSTGRES_USER: fleetmesh
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8

    ports:
      - "6379:6379"

volumes:
  postgres_data:
