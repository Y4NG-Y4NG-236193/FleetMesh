services:

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "5001:5001"
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://fleetmesh:password@postgres:5432/fleetmesh
      REDIS_HOST: redis
      PORT: 5001
      NODE_ENV: production
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: fleetmesh
      POSTGRES_USER: fleetmesh
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
